body:
  text: 四明沙門知禮集此大陀羅尼忝自髫年便能口誦且罔諳持法後習天台教觀尋其經文觀慧事儀足可行用故略出之誠堪自軌然智者所立行儀總有四種何等為四一曰常坐即文殊問經一行三昧也二曰常行即般舟經佛立三昧也三曰半行半坐即方等法華二經袒持普賢二三昧也四曰非行非坐即有依諸經行法及歷善惡無記修觀總名隨自意三昧也若據此經不制專坐唯行及以相半亦非縱任三性於中覺察而令三七日依法誦持蓋隨自意中依經行法也今於本經出十意一嚴道場二淨三業三結界四修供養五請三寶諸天六讚歎申誠七作禮八發願持呪九懺悔十修觀行仍以法華三昧補助觀想注於事儀之下俾其修者免檢他文一嚴道場經云住於淨室懸幡然燈香華飲食以用供養百録請觀音儀云當嚴飾道場香泥塗地懸諸幡蓋安置佛像南向觀音像別東向今須安千手眼觀音像或四十手如無此像秖於六手四手像前或但是觀音形貌亦無在更安釋迦勢至等像無妨行者十人已還當西向席地地若卑濕置低腳床當日日盡力供養若不能辦初日不可無施輔行云雖心口精誠須以福助日日為者彌為增上恐力不逮聽從初日必先課已資財以伸傾竭經云若諸衆生現世求願者於三七日淨持齊戒誦此陀羅尼必果所願據此修者須三七日為一期必不可減準法華三昧正修之前於一七日行方便法使事儀理觀皆悉精熟仍求加護令無障礙者也二淨三業經云誦此神呪者發廣大菩提心誓度一切衆生身持齊戒住於靜室澡浴清淨著淨衣服制心一處更莫異緣法華三昧云初入道場當以香湯沐浴著淨潔衣若大衣及諸新染服若無新者當取已衣中勝者以為入道場衣於後若出道場至不淨處當脫淨衣著不淨衣所為事竟當洗浴著本淨衣入道場行法上皆法華三昧文也縱一日都不至穢亦須一浴終竟一期專莫雜語及一切接對問訊等終竟一期依經運想不得剎那念於世務若便利飲食亦須秉護勿令散失事畢即入道場不得托事延緩大要身論開遮口論說默意論止觀也修者須依善師咨稟知已然可行之慎勿自任三結界行者於建首日未禮敬前當齊修行處如法結界經云其結界法者取刀呪二十一遍畫地為界或取淨水呪二十一遍散著四方為界或取白芥子呪二十一遍擲著四方為界或以想到處為界或取淨灰呪二十一遍為界或呪五色線二十一遍圍繞四邊為界皆得若能如法受持自肰克果經云皆得隨便行之四修供養行者依法結界已至千眼像前先敷具倚立當念一切三寶及法界衆生與我身心無二無別諸佛已悟衆生尚迷我為衆生翻迷障故禮事三寶作是念已口當唱言一切恭謹一心頂禮十方常住三寶一禮已燒香散華首者唱是諸衆等各各胡跪嚴持香華如法供養願此香華雲遍滿十方界一一諸佛土無量香莊嚴具足菩薩道成就如來香至此想云我此香華遍十方以為微妙光明臺諸天音樂天寶香諸天肴膳天寶衣不可思議妙法塵一一塵出一切塵一一塵出一切法旋轉無閡互莊嚴遍至十方三寶前十方法界三寶前悉有我身修供養一一皆悉遍法界彼彼無雜無障閡盡未來際作佛事普熏法界諸衆生蒙熏皆發菩提心同入無生證佛智想已云供養已一切恭謹五請三寶諸天行者運心普供養已胡跪燒香當念三寶雖離障清淨而已同體慈悲護念群品若能三業致請必不來而來拔苦與樂肰須至誠逐位殷勤三請必有感降唱云一心奉請南無本師釋迦牟尼世尊一心奉請南無西方極樂世界阿彌陀世尊一心奉請南無過去無量億劫千光王靜住世尊一心奉請南無過去九十九億殑伽沙諸佛世尊一心奉請南無過去無量劫正法明世尊一心奉請南無十方一切諸佛世尊一心奉請南無賢劫千佛三世一切諸佛世尊一心奉請南無廣大圓滿無閡大悲心大陀羅尼神妙章句想云法性如空不可見常住法寶難思議我今三業如法請唯願顯現受供養次位亦爾一心奉請南無觀音所說諸陀羅尼及十方三世一切尊法一心奉請南無千手千眼大慈大悲觀世音自在菩薩摩訶薩運想如佛但改云觀世音菩薩亦如是下去菩薩聲聞隨位改之一心奉請南無大勢至菩薩摩訶薩一心奉請南無總持王菩薩摩訶薩一心奉請南無日光菩薩月光菩薩摩訶薩一心奉請南無寶王菩薩藥王菩薩藥上菩薩摩訶薩一心奉請南無華嚴菩薩大莊嚴菩薩寶藏菩薩摩訶薩一心奉請南無德藏菩薩金剛藏菩薩虛空藏菩薩摩訶薩一心奉請南無彌勒菩薩普賢菩薩文殊師利菩薩摩訶薩一心奉請南無十方三世一切菩薩摩訶薩一心奉請南無摩訶迦葉無量無數大聲聞僧一心奉請善吒梵摩瞿婆伽天子護世四王天龍八部童目天女虛空神江海神泉源神河沼神藥草樹林神舍宅神水神火神風神土神山神地神宮殿神等及守護持呪一切天龍鬼神各及眷屬唯願釋迦本師彌陀慈父千光王靜住如來十方三世一切諸佛不移本際平等慈熏來降道場證我行法廣大圓滿無閡大悲心總持祕要顯現道場受我供養千手千眼觀世音菩薩摩訶薩乘本願力來到我前神呪加持頓消三障大勢至菩薩總持王等諸大菩薩摩訶迦葉諸大聲聞同運慈悲俱時來降梵釋四王諸天八部隨我請來堅守道場擁護持呪却諸魔障示現吉祥令我所修不違本願六讚歎伸誠本經無讚歎偈欲取他經恐與呪體及表報相小有參差故輒依經略述讚之南無過去正法明如來現前觀世音菩薩成妙功德具大慈悲於一身心現千手眼照見法界護持衆生令發廣大道心教持圓滿神呪永離惡道得生佛前無間重愆纏身惡疾莫能救濟悉使消除三昧辨才現生求願皆令果遂決定無疑能使速獲三乘早登佛地威神之力歎莫能窮故我一心歸命頂禮伸述誠懇隨其智力如實說之然所求之事不可增長生死所運之心必須利益群品唯在專謹方有感通慎勿容易七作禮行者應念三寶體是無緣慈悲常欲拔濟一切衆生但為無機不能起應我既再三奉請縱非目擊冥應不虛故須作已降之想燒衆名香五體投地禮上所請三寶唯諸天鬼神不須致禮若至大悲心呪及觀世音菩薩各須三禮此之人法是道場主故唱云一心頂禮本師釋迦牟尼世尊如前請中三寶諸位皆須五體投地勤重致禮禮佛想云能禮所禮性空寂感應道交難思議我此道場如帝珠釋迦如來影現中我身影現釋迦前頭面接足歸命禮至禮阿彌陀云即云阿彌陀佛影現中云云禮法想云真空法性如虛空常住法寶難思議我身影現法寶前一心如法歸命禮禮僧準上禮佛但改為菩薩等唯禮觀音云為求滅障接足禮此是懺悔主故八發願持呪經云若有比丘比丘尼優婆塞優婆夷童男童女欲誦持者於諸衆生起慈悲心先當從我發如是願此願橫深該收權實非天台教觀莫到邊涯今依一家略為標指俾其行者心有所歸願有二節前十願明成就法一往生善後六願明除滅法一往破惡然準聞呪獲四果十地等益部在方等顯矣此願合被四教菩薩旁兼兩教二乘亦有法緣慈悲隨世利物故今之行者既顯圓頓止觀覺意三昧故立願起行須順法華之意故荊溪云散引諸文該乎一代文體正意唯在醍醐故十六願須約開顯圓義釋也前十願皆稱南無大悲觀世音者南無翻歸命亦度我亦信從大悲者以此菩薩拔苦心重故稱具大悲者施無畏者此悲體圓即能與樂觀世音具如別行疏釋蓋哀憫至深故教衆生求我度脫歸心順我立乎誓願令我機感故也仍須了知大悲觀音即我本性今欲復本故稱本立願又復此願即本性之力用故馬鳴云自心起信還信自心此經云應當從我發如是願今以二義釋茲十願初約諸經四弘釋次約今家十乘釋夫四弘者依四諦起四諦者二示世間苦因果二示出世樂因果一切菩薩欲拔此苦欲與此樂故依之立四誓也依苦諦立云衆生無邊誓願度依集諦立云煩惱無數誓願斷依道諦立云法門無盡誓願知依滅諦立云佛道無上誓願成但今十願拔世間苦因在前故與四誓次第小異而皆二二相成以知法由眼智度衆生須方便船必越海道能登山舍可棲身故初二依集諦立先願知一切塵勞之法皆即法界次願得是圓淨慧眼以非此慧不能知故三四依苦諦立先願度一切沈淪之衆次願早得體內方便非此方便度生不遍故五六七八依道諦立道雖萬行不出三學今先求實慧般若即慧學次願慧成越於二死苦海次求出世上上戒定後願二學功成入於三德涅槃三學是道諦之始越苦證滅顯道諦之終也九十依滅諦立先求無為之法以宅其心則惑滅行息後願冥乎法性復本淨身則究竟常寂也縱百千願亦何出於四弘況此十耶又願不依諦名為狂願雖不出四今以觀音智巧悲深故開四為十則使行者標心立行原始要終皆悉顯了故也仍須了知始終等相體性融即故荊溪云初心遍攝觀惑法界即惑成智即生成滅名圓四誓又了前二誓拔性德之苦後二誓與性德之樂性之苦樂何須拔與即無作之誓也二約今家十乘釋者聖意多含且作二釋尋經始末以後驗前知是願成十法乘也何者以說呪前令發十願說呪訖示呪相貌有九句并呪體成十法與今家十乘更無差忒後觀行中當說言十乘者初觀不思議境二發菩提心三巧安止觀四破法遍五識通塞六調適道品七對治助開八知次位九安忍十離順道法愛十願對此唯一處前後彼則依境發心此則依境修觀各有其意初知一切法願顯不思議境非一念三千豈收一切二智慧眼願圓止觀成佛眼智也非此眼智不顯妙境故三度一切衆願發分滿菩提心也無緣與拔初住已上方現前故四善方便願成破遍也三惑破已方能任運與拔破遍即度生方便菩薩破惑為度生故五般若船願識通塞如水有船即塞能通也六越苦海願成道品也非無作道品莫越二死海故七戒定道願成助道也以無作心修事戒定最能治惡故八登涅槃山願知次位也山須自下升高雖觀即理道不浪階故九會無為舍願成安忍行也舍名捨衆速證無為故此行不專初品上地亦然天龍恭敬不以為喜即其例也十同法性身願離法愛也不滯似解合佛真身故準文二二相成者照境由止觀與拔由破惑先知通塞方修道品無對治功安有次位若不安忍則無似愛可離也此之觀法修在名字成在五品似發在六根真發在分證究盡在妙覺今立願者願修之得門成之即世或於一觀或歷餘心便入似真以至等妙又復應知此之十法雖論修證及以因果而現前一念本自圓成全性起修即因成果今立十願標心在茲又復應知此之十法雖是智者像代宣揚而並是漸頓諸經之旨以離此十更無修證之法法華大車深可例也後之六願一往破惡於中前三破地獄而初二別破刀火二種第三破一切地獄後三破餘三趣應知六願皆就對治悉檀而立故地獄云摧折枯竭餓鬼云飽滿修羅云調伏畜生云智慧如六觀音對破六道唯天從便宜以善彊故人兼入理思惟盛故餘四並從對治以惡多故皆標我者雖是行人所稱全是諸有真常我性一念千法也前十願中一一我字莫不爾也若者不定之詞隨趣對治也皆云向者訓對也為對治義宛合即以四趣我性為能對治四趣三障為所對治皆云自者三障本空無明故有治以圓法稱本虛融更非障閡故云自摧折等然能對有自他所治有三障人自治有事行理觀治他論神通感應何者若自起四趣煩惱造四趣惡業受四趣苦時稱名誦呪對之願此三障即自摧折等此事行治也若自用十乘觀慧對於四趣若惑若業若報時願得觀成障滅即摧折等此理觀治也若自觀行成能破三障顯出我性得大自在見一切衆生為四趣三障所苦以似解力對之即神通治他也以分滿力對之即感應治他也故一言我若向刀山刀山自摧折等其義甚深不可卒備原其所歸觀音能障三道神呪及我體是法界亦名中道舉一全收法法絶待以彊迷故暫分感應故曰南無以翻迷故義立對治故云我向今順圓法立上諸願名無作誓其功巨量問圓解圓修者獲益可爾無此解者修有何益答法體本然聖人稱本而示其修此者縱未圓解但得機成任運獲益若能解者功不可論如摩尼珠愚人得之非全無益但貿一衣一食而已若其識者十事修治四洲雨寶故經云有慧觀方便者十地果位克獲不難是故行者當親善師學茲圓解立願之際心口一如三障即消法身速證既略知此旨當發是願首者唱云南無大悲觀世音願我速知一切法南無大悲觀世音願我早得智慧眼南無大悲觀世音願我速度一切衆南無大悲觀世音願我早得善方便南無大悲觀世音願我速乘般若船南無大悲觀世音願我早得越苦海南無大悲觀世音願我速得戒定道南無大悲觀世音願我早登涅槃山南無大悲觀世音願我速會無為舍南無大悲觀世音願我早同法性身我若向刀山刀山自摧折我若向火湯火湯自消滅我若向地獄地獄自枯竭我若向餓鬼餓鬼自飽滿我若向修羅惡心自調伏我若向畜生自得大智慧經云發是願已至心稱念我之名字亦應專念我本師阿彌陀如來然後即當誦此陀羅尼行者想身對此佛菩薩前稱念尊名唯在哀切如遭焚溺求於救濟若時促略稱七遍若時稍寬多稱無妨南無觀世音菩薩南無阿彌陀佛稱念訖云觀世音菩薩白佛言世尊若諸衆生誦持大悲神呪墮三惡道者我誓不成正覺誦持大悲神呪若不生諸佛國者我誓不成正覺誦持大悲神呪若不得無量三昧辨才者我誓不成正覺誦持大悲神呪於現在生中一切所求若不果遂者不得為大悲心陀羅尼也乃至說是語已於衆會前合掌正住於諸衆生起大悲心開顏含笑即說如是廣大圓滿無閡大悲心大陀羅尼神妙章句陀羅尼曰南無喝囉怛那哆囉夜㖿一南無阿𠼝㖿二婆盧羯帝爍鉢囉㖿三菩提薩哆婆㖿四摩訶薩哆婆㖿五摩訶迦盧尼迦㖿六唵七薩皤囉罰曳八數怛那怛寫九南無悉吉利埵伊蒙阿利㖿十婆盧吉帝室佛囉楞馱婆十一南無那囉謹墀十二醯唎摩訶皤哆沙咩十三羊鳴音薩婆阿他豆輸朋十四阿逝孕十五薩婆薩哆那摩婆伽十六摩罰特豆十七怛姪他十八唵阿婆盧醯十九盧迦帝二十迦羅帝二十一夷醯唎二十二摩訶菩提薩埵二十三薩婆薩婆二十四摩羅摩羅二十五摩醯摩醯唎馱孕二十六俱盧俱盧羯懞二十七度盧度盧罰闍㖿帝二十八摩訶罰闍耶帝二十九陀羅陀羅三十地利尼三十一室佛囉耶三十二遮羅遮羅三十三摩摩罰摩羅三十四穆帝囇三十五伊醯伊醯三十六室那室那三十七阿羅嘇佛羅舍利三十八罰沙罰嘇三十九佛囉舍耶四十呼嚧呼嚧摩囉四十一呼嚧呼嚧醯利四十二娑羅娑羅四十三悉利悉利四十四蘇嚧蘇嚧四十五菩提夜菩提夜四十六菩馱夜菩馱夜四十七彌帝利夜四十八那羅謹墀四十九地唎瑟尼那五十波夜摩那五十一娑婆訶五十二悉陀夜五十三娑婆訶五十四摩訶悉陀夜五十五娑婆訶五十六悉陀喻藝五十七室皤羅耶五十八娑婆訶五十九那羅謹墀六十娑婆訶六十一摩羅那羅六十二娑婆訶六十三悉羅僧阿穆佉耶六十四娑婆訶六十五娑婆摩訶悉陀夜六十六娑婆訶六十七者吉羅阿悉陀夜六十八娑婆訶六十九波陀摩羯悉哆夜七十娑婆訶七十一那羅謹墀皤伽羅㖿七十二娑婆訶七十三摩婆利勝羯羅夜七十四娑婆訶七十五南無喝囉怛那哆囉夜㖿七十六南無阿唎㖿七十七婆嚧吉帝七十八爍皤囉夜七十九娑婆訶八十悉殿都八十一漫哆羅八十二跋陀耶八十三莎婆訶八十四觀世音菩薩說此呪已大地六變震動天雨寶華繽紛而下十方諸佛悉皆歡喜天魔外道恐怖毛竪一切衆會皆獲果證或得須陀洹果或得斯陀含果或得阿那含果或得阿羅漢果者或得一地二地三四五地乃至十地者無量衆生發菩提心九懺悔行者誦呪畢當念一切緣障皆由宿因過去今生與諸有情何惡不造罪纍既積世世相逢為冤為親為障為惱若不懺悔無由解脫道法不成故須披陳哀求三寶為我滅除經云為一切衆生懺悔先業之罪亦自懺謝無量劫種種惡業法華三昧云業性雖空果報不失顛倒因緣起諸重罪流淚悲泣口宣懺悔應心念言我及衆生無始常為三業六根重罪所障不見諸佛不知出要但順生死不知妙理我今雖知由與衆生同為一切重罪所障今對觀音十方佛前普為衆生歸命懺悔唯願加護令障消滅念已唱云普為四恩三有法界衆生悉願斷除三障歸命懺悔唱已五體投地心復念言我與衆生無始來今由愛見故內計我人外加惡友不隨喜他一毫之善唯遍三業廣造衆罪事雖不廣惡心遍布晝夜相續無有間斷覆諱過失不欲人知不畏惡道無慚無愧撥無因果故於今日深信因果生重慚愧生大怖畏發露懺悔斷相續心發菩提心斷惡修善勤策三業翻昔重過隨喜凡聖一毫之善念十方佛有大福慧能救拔我及諸衆生從二死海置三德岸從無始來不知諸法本性空寂廣造衆惡今知空寂為求菩提為衆生故廣修諸善遍斷衆惡唯願觀音慈悲攝受想訖唱云至心懺悔比丘某甲等與法界一切衆生現前一心本具千法皆有神力及以智明上等佛心下同含識無始暗動障此靜明觸事昏迷舉心縛著平等法中起自他想愛見為本身口為緣於諸有中無罪不造十惡五逆謗法謗人破戒破齊毀塔壞寺偷僧祇物污淨梵行侵損常住飲食財物千佛出世不通懺悔如是等罪無量無邊捨茲形命合墮三塗備嬰萬苦復於現世衆惱交煎或惡疾縈纏他緣逼迫障於道法不得熏修今遇大悲圓滿神呪速能滅除如是罪障故於今日至心誦持歸向觀世音菩薩及十方大師發菩提心修真言行與諸衆生發露衆罪求乞懺悔畢竟消除唯願大悲觀世音菩薩摩訶薩千手護持千眼照見令我等內外障緣寂滅自他行願圓成開本見知制諸魔外三業精進修淨土因至捨此身更無他趣決定得生阿彌陀佛極樂世界親承供養大悲觀音具諸總持廣度群品皆出苦輪同到智地懺悔發願已歸命禮三寶起禮一拜次當如法旋繞或三或七欲旋繞時先須正立想此道場如法界十方三寶畟塞虛空以次回身旋繞法座十方三寶心性寂滅影現十方心想如夢梵聲如響勿令心散口唱云南無十方佛南無十方法南無十方僧南無本師釋迦牟尼佛南無阿彌陀佛南無千光王靜住佛南無廣大圓滿無閡大悲心大陀羅尼南無千手千眼觀世音菩薩南無大勢至菩薩南無總持王菩薩或三稱或七稱旋繞已還至像前三自歸自歸佛依當願衆生體解大道發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無閡和南聖衆十觀行行者禮懺訖應出道場別於一處身就繩床依經修觀經說此呪結益才訖大梵天王請曰惟願大士為我說此陀羅尼形貌相狀觀世音菩薩言大慈悲心是平等心是無為心是無染心是空觀心是恭敬心是卑下心是無雜亂心是無上菩提心是當知如是等心即是陀羅尼相貌汝當依此而修行之今輒釋其意經文九心即依境發菩提心等九法乘也以初神呪是其理境難通顯說肰以密談愈彰深祕故上根一聞即能入證或階四果或登十地內外凡位通名發心是則大梵覩於上根聞境得悟乃為中下請餘九乘故云相貌理境如車體相貌如具度問既稱法稱機故觀音歎曰汝為方便利益一切衆生故作斯問故知呪體及以九心十乘意備又復此經頻令行者於諸衆生起大慈悲若非依理豈忘愛見故初理境即慈悲本後之八心成悲之法應知此經正明悲行又復應知部在方等此之十法通於四教而廣大圓滿無礙大悲藏通二教有名無體離斷常中豈不廣大等耶別雖有理修在後時圓教初心盡茲體用今明觀心專依圓妙仍有二種謂約行托事也初約行者直就一念觀於十界百界千如妙法雖即一念千法宛肰全體即空當處即假仍非二邊又即雙照不可以一多說安以有無思若邊若中皆莫能擬故密語示及顯了詮皆不可以識識不可以言言是為於己心觀不思議境也既知己心若是復思一切衆生念念皆爾本具九界既即佛界仍各具十種因果即一苦一切苦我與衆生縱貪瞋癡動身口意隨業受報萬劫千生故於自他哀傷哽痛深起悲心誓拔其苦本具佛界既即九界仍各具十種因果即一樂一切樂我與衆生以凡小心求人天身及二乘果得少為足資生囏難故於自他愛念憐憫深起慈心誓與其樂此乃與究竟樂拔一切苦故名大悲慈心慈悲雖普散動尚多須用不二止觀安於法性使寂照均融名平等心理若未顯由三惑覆當觀此惑本空法性本淨無可破立名無為心若著此能觀則於通起塞識此通塞名無染心諸法雖空證由觀道觀不調適品次不生道品相生成空觀心蔽資理惑不顯真如事度助開見生齊佛名恭敬心乍息麁心謂為深詣若知圓位上慢可祛名卑下心名利眷屬三術離之三昧可成名無雜亂心行上九事過內外障若起法愛則不得前能離此愛方登分果名無上菩提心上根觀境即入初住或內外凡中根二至七下根盡用二託事者觀音一身有千手眼手有提拔之力眼有照明之用即是一千神通智慧也一身具千手眼千手眼不離一身乃表一念即千通慧十種通慧不離一念法稱廣大圓滿復云無礙大悲非一念千法焉稱此名肰既密說人那解之乃現此相而為表示非一家觀法安能盡釋法名身相在於彼部領解雖殊今之行人得法華意於茲名相終無異塗況於道場唯瞻此相不表觀法何以用心故二種觀門相須而進若行立持誦若却坐思惟不思議觀不應暫廢是名依法受持也故前立十願今示十乘即所願之法既令依此而修行之即是初心修相後文云有觀慧方便者十地果位克獲不難即分滿證相觀成似發準例前後其意必肰若未深諳一家教觀須近善師咨決解行方識正邪故方便五緣四或可闕善知識緣必須具也若居異處無師可承當自尋止觀仍須輔行決通觀道方可修之慎勿師心自立規矩又復應知如上說者此就呪體深取經宗為成觀行者也若論此經力用何人不攝何善不收故求聲聞人各獲果證求世間事無不從心而略示四十手功德欲得富饒欲求官位除身惡疾求見善友欲生淨土樂趣諸天莫不果願乃至經云持呪者若風若水霑著其身不受惡趣常生佛前若行者未能修觀但當深信斷諸疑心依文誦持現世當生離苦得脫故法華懺立有相安樂行不入三昧但誦持故亦能得見上妙色也故知初心入門多種妙悟之時理應兩捨唯願若士若庶若俗若僧於此總持生決定信起精進心於相無相盡力修之現世障惱皆除淨土往生不惑廣論利益具載經文
